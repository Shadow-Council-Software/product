services:
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      MATTER_ADAPTER: mock
      PORT: '3001'
    profiles: ['default', 'dev']

  lcars-web:
    build:
      context: ./lcars-web
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_ENGINE_URL: http://engine:3001
    depends_on:
      - engine
    profiles: ['default', 'dev']

  # Sim Bridge — digital twin (no Matter hardware)
  sim-bridge:
    build:
      context: ../sim/bridge
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      SIM_BRIDGE_PORT: '3002'
      SIM_LAYOUT_PATH: /layout/onimurasame-residence-2026-05-24.json
    volumes:
      - ../sim/layouts/onimurasame-residence-2026-05-24.json:/layout/onimurasame-residence-2026-05-24.json:ro
    profiles: ['sim']

  engine-sim:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      MATTER_ADAPTER: sim
      SIM_BRIDGE_URL: http://sim-bridge:3002
      PORT: '3001'
    depends_on:
      - sim-bridge
    profiles: ['sim']

  # Pin digest after live W0 — update SHA from rack run (see spike/w0/README.md)
  ohf-sidecar:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    # digest: sha256:REPLACE_AFTER_LIVE_W0
    profiles: ['sidecar']
    ports:
      - '5580:5580'

name: Sprint 1 validate

on:
  pull_request:
    branches: [product/enterprise, main]
    paths:
      - 'enterprise/runtime/**'
      - 'enterprise/openspec/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install runtime dependencies
        working-directory: enterprise/runtime
        run: npm install

      - name: Build packages and engine
        working-directory: enterprise/runtime
        run: npm run build

      - name: Run contract tests
        working-directory: enterprise/runtime
        run: npm test

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec@latest

      - name: OpenSpec strict validation
        working-directory: enterprise
        run: openspec validate --all --strict

      - name: Comment PR result
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}';
            const body = outcome === 'success'
              ? '✅ Sprint 1 validation passed: `npm test` + `openspec validate --all --strict`'
              : '❌ Sprint 1 validation failed. See workflow logs.';
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

paths:
  raw: data/raw
  clips_qualified: data/clips/qualified
  clips_rejected: data/clips/rejected
  output: data/output
  jobs: data/jobs
  datasets: data/datasets
  sqlite: data/jobs.db

pipeline:
  target_minutes: 30
  min_segment_score: 0.75
  clip_duration_sec_min: 3
  clip_duration_sec_max: 15
  crossfade_sec: 0.2
  download_min_height: 720
  max_discovery_retries: 3

analysis:
  motion_threshold: 0.12
  visual_threshold: 0.7
  audio_peak_db_threshold: -12
  sample_fps: 2

resolve:
  project_name_prefix: ClipForge
  timeline_name: ClipForge_Timeline
  render_format: mp4
  render_codec: H.264
  script_module_path: null

llm:
  provider: openai  # openai | anthropic | grok
  model: gpt-4o-mini
  temperature: 0.2

triggers:
  default: manual_local
  watch_default_interval_minutes: 60

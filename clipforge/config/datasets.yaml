# Source corpora — use sources[] for pluggable adapters (see config/sources.yaml).
datasets:
  - id: inbox_local
    label: Local inbox (operator drop folder)
    sources:
      - type: local_folder
        paths:
          - data/raw/inbox/**

  - id: demo_stock
    label: Example multi-provider search (YouTube + web video)
    sources:
      - type: search
        provider: auto
        queries:
          - site:archive.org stock footage city timelapse
        max_results: 5

  - id: youtube_search
    label: YouTube-only discovery via yt-dlp
    sources:
      - type: search
        provider: ytsearch
        queries: []
        after_date: "2025-01-01"
        max_results: 15
      - type: url_list
        urls: []

  - id: remote_urls
    label: Explicit URL list only
    sources:
      - type: url_list
        urls: []

  - id: ftp_incoming
    label: FTP watch folder (configure host)
    sources:
      - type: ftp
        host: ""
        port: 21
        user: ""
        remote_path: /
        after_date: "2025-01-01"
        passive: true

  - id: curated_manifest
    label: JSONL manifest-driven corpus
    sources:
      - type: manifest
        manifest: data/datasets/curated_manifest.jsonl
        after_date: "2025-01-01"
